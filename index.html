<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자격증 공부</title>
  <meta name="description" content="자격증 공부용 관리자 편집 웹사이트" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <script>
    /*
      ============================
      관리자 비밀번호 설정 위치
      아래 값만 원하는 비밀번호로 바꾸면 됩니다.
      ============================
    */
    window.APP_CONFIG = {
      ADMIN_PASSWORD: "4542"
    };
  </script>
<div class="workspace-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-header">
          <div class="brand-icon">📘</div>
          <div class="brand-text">
            <strong>공부 메뉴</strong>
            <p></p>
          </div>
          <button id="sidebarToggleBtn" class="icon-btn" title="사이드바 접기/펼치기">☰</button>
        </div>

        <div class="sidebar-controls">
          <button id="adminToggleBtn" class="primary-btn">관리자 모드</button>
          <button id="exitAdminBtn" class="ghost-btn hidden">관리자 종료</button>

          <div id="adminMenuActions" class="admin-menu-actions hidden">
            <button id="addMenuBtn" class="action-btn">+ 메뉴 추가</button>
            
            
          </div>

          <div class="search-wrap">
            <input id="searchInput" class="search-input" type="text" placeholder="메뉴/내용 검색" />
          </div>
        </div>

        <nav class="sidebar-nav">
          <ul id="menuList" class="menu-list"></ul>
        </nav>
      </div>
    </aside>

    <main class="content-stage">
      <section class="content-area">
        <header class="content-header">
          <p class="eyebrow">CERTIFICATE STUDY SPACE</p>
          <h2 id="currentMenuTitle">-</h2>
          <div class="header-status-wrap">
            <div id="localModeNotice" class="local-mode-notice hidden"></div>
            <div id="adminStatus" class="status-badge">일반 모드</div>
          </div>
        </header>

        <section id="viewerSection" class="viewer-section">
          <div id="contentView" class="content-view"></div>
        </section>

        <section id="editorSection" class="editor-section hidden">
          <div class="editor-card">
            <div class="editor-header-row">
              <h3>내용 편집</h3>
              <div class="editor-inline-actions">
                <button id="clearContentBtn" class="ghost-btn danger">내용 삭제</button>
              </div>
            </div>

            <label class="input-label" for="contentTitleInput">내용 제목</label>
            <input id="contentTitleInput" class="text-input" type="text" placeholder="예: 필기 핵심 요약" />

            <label class="input-label" for="contentTextInput">내용</label>
            
            <div class="editor-toolbar">
              <button type="button" class="toolbar-btn toolbar-icon-btn" data-cmd="justifyLeft" title="좌측 정렬" aria-label="좌측 정렬">
                <span class="align-icon align-left"><span></span><span></span><span></span></span>
              </button>
              <button type="button" class="toolbar-btn toolbar-icon-btn" data-cmd="justifyCenter" title="가운데 정렬" aria-label="가운데 정렬">
                <span class="align-icon align-center"><span></span><span></span><span></span></span>
              </button>
              <button type="button" class="toolbar-btn toolbar-icon-btn" data-cmd="justifyRight" title="우측 정렬" aria-label="우측 정렬">
                <span class="align-icon align-right"><span></span><span></span><span></span></span>
              </button>
              <button type="button" class="toolbar-btn toolbar-bold-btn" data-cmd="bold" title="굵게">B</button>
              <label class="color-picker-wrap" title="글자 색상">
                <span>색 지정</span>
                <input id="textColorPicker" type="color" value="#24324a" />
              </label>
              <button type="button" class="toolbar-btn" id="colorApplyBtn" title="지정한 색 적용">색 적용</button>
            </div>
            <div id="contentTextInput" class="text-area rich-editor" contenteditable="true" data-placeholder="공부 내용을 작성하세요.&#10;&#10;여기에 유튜브 링크를 붙여넣으면 자동 미리보기가 됩니다.&#10;PDF/이미지는 이 칸에 붙여넣기하거나 드래그하면 자동 첨부됩니다."></div>
    

            <label class="input-label" for="youtubeInput">유튜브 링크 (직접 입력 또는 내용칸 자동 감지)</label>
            <input id="youtubeInput" class="text-input" type="text" placeholder="https://www.youtube.com/watch?v=... 또는 https://youtu.be/..." />
            <div id="youtubePreviewEditor" class="youtube-preview-wrap empty">유튜브 링크를 입력하면 미리보기가 표시됩니다.</div>

            <label class="input-label" for="attachmentInput">PDF / 이미지 첨부 (직접 선택도 가능)</label>
            <input id="attachmentInput" class="file-input" type="file" accept=".pdf,image/*" multiple />
            <div id="attachmentListEditor" class="attachment-list editor-attachment-list"></div>

            <div class="editor-actions">
              <button id="saveContentBtn" class="primary-btn">저장</button>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <div class="empty-emoji">📝</div>
      <h3>아직 내용이 없습니다</h3>
      <p>관리자 모드에서 이 메뉴의 내용을 작성해 주세요.</p>
    </div>
  </template>

  
  <div id="iconPickerModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="iconPickerTitle">
    <div class="modal-card">
      <h3 id="iconPickerTitle" class="modal-title">메뉴 아이콘 선택</h3>
      <p class="modal-subtitle">원하는 아이콘을 클릭해서 바로 적용하세요.</p>
      <div id="iconPickerCurrent" class="modal-current-icon"></div>
      <div id="iconPickerGrid" class="icon-picker-grid"></div>
      <div class="modal-actions">
        <button id="iconPickerCancelBtn" class="ghost-btn">닫기</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
